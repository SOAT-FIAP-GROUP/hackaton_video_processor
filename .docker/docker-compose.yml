name: "Video Processor"
services:
  db:
    build:
        context: ../.
        dockerfile: .docker/db.Dockerfile
    container_name: videos-db
    environment:
      #POSTGRES_DB: video_processor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - video_processor_network
  api:
    build:
        context: ../.
        dockerfile: .docker/api.Dockerfile
    image: video_processor_api:latest
    container_name: api
    restart: unless-stopped
    environment:
      - AWS_ACCESS_KEY_ID=
      - AWS_REGION=
      - AWS_S3_BUCKET=
      - AWS_SECRET_ACCESS_KEY=
      - AWS_SQS_QUEUE_NAME_VIDEO_PROCESSING=
      - AWS_SQS_QUEUE_NAME_NOTIFICATION=
      - COGNITO_CLIENT_ID=
      - COGNITO_CLIENT_SECRET=
      - COGNITO_USER_POOL_ID=
      - GIN_MODE=release
      - API_PORT=8080
      - TEMP_PATH=/unknown
      - DB_HOST=db
      - DB_NAME=video_processor
      - DB_REPLICA_NAME=video_processor_replica
      - DB_PASSWORD=password
      - DB_PORT=5432
      - DB_SSL_MODE=disable
      - DB_USER=postgres
    ports:
      - "8080:8080"
    depends_on:
        - db
    networks:
        - video_processor_network
  worker:
    build:
      context: ../.
      dockerfile: .docker/worker.Dockerfile
    image: video_processor_worker:latest
    container_name: worker
    restart: unless-stopped
    environment:
      - AWS_ACCESS_KEY_ID=
      - AWS_REGION=
      - AWS_S3_BUCKET=
      - AWS_SECRET_ACCESS_KEY=
      - AWS_SQS_QUEUE_NAME_VIDEO_PROCESSING=
      - AWS_SQS_QUEUE_NAME_NOTIFICATION=
      - DB_HOST=db
      - DB_NAME=video_processor
      - DB_PASSWORD=password
      - DB_PORT=5432
      - DB_SSL_MODE=disable
      - DB_USER=postgres
      - TEMP_PATH=/mnt/media
    volumes:
      - media_data:/mnt/media
    depends_on:
      - db
    networks:
      - video_processor_network

networks:
    video_processor_network:
        driver: bridge
volumes:
  media_data:
    driver: local
  db-data:
    driver: local