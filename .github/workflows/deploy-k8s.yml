name: Deploy to Kubernetes

on:
  workflow_run:
    workflows: ["Build Docker Image"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      force-deploy:
        description: 'Força a execução do deploy'
        required: false
        default: 'true'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event.inputs.force-deploy == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set Docker images variables
        run: |
          DOCKER_IMAGE_API="${{ secrets.DOCKER_USERNAME }}/video_processor_api:latest"
          DOCKER_IMAGE_WORKER="${{ secrets.DOCKER_USERNAME }}/video_processor_worker:latest"
          echo "DOCKER_IMAGE_WORKER=$DOCKER_IMAGE_WORKER" >> $GITHUB_ENV
          echo "DOCKER_IMAGE_API=$DOCKER_IMAGE_API" >> $GITHUB_ENV

      - name: Render Deployments
        run: |
          envsubst < k8s/api/deployment.yaml > k8s/api/deployment_rendered.yaml
          envsubst < k8s/worker/deployment.yaml > k8s/worker/deployment_rendered.yaml

      - name: Configure kubectl
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ASSUME_ROLE_ARN_EKS }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ vars.AWS_REGION }}

      - name: Get SSM parameters
        id: ssm
        run: |
          PARAMS=$(aws ssm get-parameters \
            --region $AWS_REGION \
            --names \
            S3_BUCKET \
            SQS_QUEUE_NAME_VIDEO_PROCESSING \
            SQS_QUEUE_NAME_NOTIFICATION \
            COGNITO_CLIENT_ID \
            COGNITO_CLIENT_SECRET \
            COGNITO_USER_POOL_ID \
            DB_HOST \
            DB_USER \
            DB_PASSWORD \
            --with-decryption \
            --query "Parameters[*].[Name,Value]" \
            --output text)

          while read name value; do
            echo "$name=$value" >> $GITHUB_OUTPUT
          done <<< "$PARAMS"

      - name: Render ConfigMaps
        run: |
          export AWS_S3_BUCKET="${{ steps.ssm.outputs.S3_BUCKET }}"
          export AWS_SQS_QUEUE_NAME_VIDEO_PROCESSING="${{ steps.ssm.outputs.SQS_QUEUE_NAME_VIDEO_PROCESSING }}"
          export AWS_SQS_QUEUE_NAME_NOTIFICATION="${{ steps.ssm.outputs.SQS_QUEUE_NAME_NOTIFICATION }}"
          export COGNITO_CLIENT_ID="${{ steps.ssm.outputs.COGNITO_CLIENT_ID }}"
          export COGNITO_USER_POOL_ID="${{ steps.ssm.outputs.COGNITO_USER_POOL_ID }}"
          export DB_HOST="${{ steps.ssm.outputs.DB_HOST }}"
          export DB_USER="${{ steps.ssm.outputs.DB_USER }}"

          envsubst < k8s/api/configmap.yaml > k8s/api/configmap_rendered.yaml
          envsubst < k8s/worker/configmap.yaml > k8s/worker/configmap_rendered.yaml

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name hakaton-app-dev --region ${{ vars.AWS_REGION }}

      - name: Apply Kubernetes Secrets
        if: ${{ inputs.destroy != 'true' }}
        run: |
          kubectl create secret generic video-processor-secret \
            --from-literal=aws.cognito.client.secret="${{ steps.ssm.outputs.COGNITO_CLIENT_SECRET }}" \
            --from-literal=db.password="${{ steps.ssm.outputs.DB_PASSWORD }}" \
            --from-literal=aws.accesskey.id="${{ secrets.AWS_ACCESS_KEY }}" \
            --from-literal=aws.secret.accesskey="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/api
          kubectl apply -f k8s/worker
          kubectl rollout status deployment/video-processor-api-app
          kubectl rollout status deployment/video-processor-worker-app