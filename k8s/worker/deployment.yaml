apiVersion: apps/v1
kind: Deployment
metadata:
  name: video-processor-worker-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: video-processor-worker-app
  template:
    metadata:
      labels:
        app: video-processor-worker-app
    spec:
      containers:
      - name: video-processor-worker-container
        image: ${DOCKER_IMAGE_WORKER}
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
          - name: AWS_S3_BUCKET
            valueFrom:
              configMapKeyRef:
                name: video-processor-worker-config
                key: aws.bucket.name
          - name: AWS_SQS_QUEUE_NAME_VIDEO_PROCESSING
            valueFrom:
              configMapKeyRef:
                name: video-processor-worker-config
                key: aws.queue.name.videoprocessing
          - name: AWS_SQS_QUEUE_NAME_NOTIFICATION
            valueFrom:
              configMapKeyRef:
                name: video-processor-worker-config
                key: aws.queue.name.notification
        resources:
          requests:
            cpu: "100m"
            memory: 200Mi
          limits:
            cpu: "300m"
            memory: 400Mi
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 120
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 120
          periodSeconds: 5