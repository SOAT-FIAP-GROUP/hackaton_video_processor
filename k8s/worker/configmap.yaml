apiVersion: v1
kind: ConfigMap
metadata:
  name: video-processor-worker-config
data:
  aws.bucket.name: "${AWS_S3_BUCKET}"
  aws.queue.name.videoprocessing: "${AWS_SQS_QUEUE_NAME_VIDEO_PROCESSING}"
  aws.queue.name.notification: "${AWS_SQS_QUEUE_NAME_NOTIFICATION}"
  aws.congnito.client.id: "${COGNITO_CLIENT_ID}"
  aws.congnito.user-pool.id: "${COGNITO_USER_POOL_ID}"
  db.host: "${DB_HOST}"
